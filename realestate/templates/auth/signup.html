{% extends 'base.html' %}
{% block title %}Sign Up — EstateVista{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg p-4 p-md-5 auth-card">
                <div class="text-center mb-4">
                    <i class="bi bi-buildings-fill display-4 text-primary"></i>
                    <h3 class="fw-bold mt-2">Create Account</h3>
                    <p class="text-muted">Join EstateVista and find your dream home</p>
                </div>

                <form action="{{ url_for('auth.signup') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-600">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="name" class="form-control"
                                   placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-600">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control"
                                   placeholder="john@email.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-600">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Min 6 characters" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-600">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="confirm_password" class="form-control"
                                   placeholder="Re-enter password" required>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Create Account <i class="bi bi-arrow-right"></i>
                        </button>
                    </div>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}" class="fw-600 text-decoration-none">Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
